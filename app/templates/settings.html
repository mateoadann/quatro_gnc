{% extends "base.html" %}

{% block content %}
<section class="hero compact">
  <div>
    <h1>Perfil de usuario</h1>
    <p>Configuracion general del workspace.</p>
  </div>
</section>

<section class="grid single">
  <div class="card">
    <h2>Workspace</h2>
    <form class="form-grid" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <input type="hidden" name="form_type" value="workspace" />
      <label>
        Nombre del workspace
        <input
          type="text"
          name="workspace_name"
          value="{{ workspace_name or '' }}"
          required
        />
      </label>
      <button class="primary-btn" type="submit">Guardar cambios</button>
      <p class="muted">Este nombre se muestra en el titulo y la marca.</p>
    </form>
  </div>
</section>
{% endblock %}
